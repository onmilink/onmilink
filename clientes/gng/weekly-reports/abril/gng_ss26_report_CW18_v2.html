*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0a0a0a;--white:#f5f2ed;--cream:#eeebe4;--mid:#b8b4ac;--muted:#7a7670;--border:rgba(0,0,0,0.08);
  --green:#1a3a0a;--green-bg:#e8ede3;--red:#3a0a0a;--red-bg:#ede3e3;
  --amber:#3a2a0a;--amber-bg:#ede8d8;
}
body{background:var(--white);color:var(--black);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;}

/* HEADER */
.hdr{background:var(--black);color:var(--white);padding:20px 40px;display:flex;align-items:center;gap:20px;flex-wrap:nowrap;}
.hdr-div{width:1px;height:32px;background:rgba(255,255,255,0.1);flex-shrink:0;}
.hdr-info{flex-shrink:0;}
.hdr-title{font-family:'TimesTen',serif;font-size:15px;font-weight:normal;white-space:nowrap;}
.hdr-sub{font-size:9px;color:rgba(255,255,255,0.35);font-family:'DM Mono',monospace;margin-top:3px;letter-spacing:0.06em;white-space:nowrap;}
.hdr-spacer{flex:1;min-width:12px;}
.week-selector{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.week-btn{font-family:'TimesTen',serif;font-size:11px;padding:6px 14px;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);background:transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.week-btn:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.8);}
.week-btn.active{background:var(--white);border-color:var(--white);color:var(--black);}
.hdr-onmi{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.hdr-onmi-label{font-family:'DM Mono',monospace;font-size:7px;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}

/* LAYOUT */
.wrap{max-width:1180px;margin:0 auto;padding:32px 40px 48px;}
.sec-label{font-family:'TimesTen',serif;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);font-weight:normal;}
.mb32{margin-bottom:32px;}.mb24{margin-bottom:24px;}.mb12{margin-bottom:12px;}

/* SUMMARY */
.summary{border:1px solid var(--border);background:var(--black);color:var(--white);padding:28px 32px;margin-bottom:32px;}
.summary-title{font-family:'TimesTen',serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:14px;font-weight:normal;}
.summary-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.08);}
.summary-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;padding:4px 10px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);letter-spacing:0.08em;}
.summary-tag.pos{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.75);}
.summary-tag.neg{background:rgba(180,40,40,0.15);color:rgba(255,120,120,0.85);}
.summary-lines{display:flex;flex-direction:column;gap:10px;}
.summary-line{font-family:'TimesTen',serif;font-size:14px;line-height:1.5;color:rgba(255,255,255,0.8);padding-left:14px;border-left:1px solid rgba(255,255,255,0.12);}
.summary-line strong{font-weight:normal;color:var(--white);}

/* SECTION BLOCK */
.section-block{border:1px solid var(--border);margin-bottom:24px;}
.section-block-hdr{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.section-block-title{font-family:'TimesTen',serif;font-size:16px;font-weight:normal;flex:1;letter-spacing:0.01em;}
.section-block-hdr.meta{background:#0a1628;border-bottom-color:rgba(255,255,255,0.08);}
.section-block-hdr.meta .section-block-title{color:#ffffff;}
.section-block-hdr.email{background:#0a0a0a;border-bottom-color:rgba(255,255,255,0.08);}
.section-block-hdr.email .section-block-title{color:#ffffff;}
.section-block-hdr.ecomm{background:#0e1f08;border-bottom-color:rgba(255,255,255,0.08);}
.section-block-hdr.ecomm .section-block-title{color:#ffffff;}
.section-block-hdr.meta .filter-tab{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.45);}
.section-block-hdr.meta .filter-tab:hover{border-color:rgba(255,255,255,0.6);color:rgba(255,255,255,0.9);}
.section-block-hdr.meta .filter-tab.active{background:#fff;border-color:#fff;color:#0a1628;}
.section-block-hdr.email .filter-tab{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.45);}
.section-block-hdr.email .filter-tab:hover{border-color:rgba(255,255,255,0.6);color:rgba(255,255,255,0.9);}
.section-block-hdr.email .filter-tab.active{background:#fff;border-color:#fff;color:#0a0a0a;}
.section-block-hdr.ecomm .filter-tab{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.45);}
.section-block-hdr.ecomm .filter-tab:hover{border-color:rgba(255,255,255,0.6);color:rgba(255,255,255,0.9);}
.section-block-hdr.ecomm .filter-tab.active{background:#fff;border-color:#fff;color:#0e1f08;}
.section-block-body{padding:20px;}

/* FILTER TABS */
.filter-tabs{display:flex;gap:4px;}
.filter-tab{font-family:'DM Mono',monospace;font-size:8px;padding:4px 12px;border:1px solid var(--border);background:transparent;cursor:pointer;letter-spacing:0.08em;color:var(--muted);transition:all 0.12s;}
.filter-tab:hover{border-color:var(--black);color:var(--black);}
.filter-tab.active{background:var(--black);border-color:var(--black);color:var(--white);}

/* KPI STRIP */
.kpi-strip{border:1px solid var(--border);background:var(--cream);margin-bottom:16px;}
.kpi-row{display:grid;border-bottom:1px solid var(--border);}
.kpi-row:last-child{border-bottom:none;}
.kpi-row-4{grid-template-columns:repeat(4,minmax(0,1fr));}
.kpi-row-3{grid-template-columns:repeat(3,minmax(0,1fr));}
.kpi-cell{padding:18px 22px;border-right:1px solid var(--border);}
.kpi-cell:last-child{border-right:none;}
.kpi-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.kpi-v{font-family:'TimesTen',serif;font-size:24px;font-weight:normal;letter-spacing:-0.01em;line-height:1;}
.kpi-s{font-size:9px;color:var(--muted);margin-top:6px;font-family:'DM Mono',monospace;min-height:14px;}

/* DELTA */
.delta{display:inline-flex;align-items:center;gap:2px;font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;margin-left:3px;vertical-align:middle;}
.delta.up{background:var(--green-bg);color:var(--green);}
.delta.down{background:var(--red-bg);color:var(--red);}

/* CAMP TABLE */
.camp-table{width:100%;border-collapse:collapse;font-size:12px;}
.camp-table th{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-weight:400;}
.camp-table th.r,.camp-table td.r{text-align:right;}
.camp-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
.camp-table tr:last-child td{border-bottom:none;}
.camp-table tr:hover td{background:rgba(0,0,0,0.012);}
.camp-name{font-family:'DM Mono',monospace;font-size:10px;margin-bottom:3px;}
.camp-desc{font-size:10px;color:var(--muted);line-height:1.4;max-width:320px;}
.pill{display:inline-block;font-family:'DM Mono',monospace;font-size:7.5px;padding:2px 7px;font-weight:500;letter-spacing:0.04em;margin-top:4px;}
.pill-main{background:var(--cream);color:var(--muted);border:1px solid var(--border);}
.pill-scale{background:var(--green-bg);color:var(--green);}
.pill-hot{background:#ede3e3;color:#3a0a0a;}
.pill-test{background:var(--amber-bg);color:var(--amber);}
.pill-ger{background:#e8e8e3;color:#555;}
.pill-traf{background:#ede8f5;color:#2a0a5a;}
.pill-incr{background:#e8e8e4;color:#555;border:1px solid var(--border);}
.roas-hi{font-weight:500;color:var(--green);}.roas-mid{font-weight:500;color:var(--amber);}.roas-lo{color:var(--red);}
.dash{color:var(--mid);}

/* CREATIVES */
.cr-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;}
.cr-card{border:1px solid var(--border);overflow:hidden;background:#fff;}
.cr-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
.cr-body{padding:14px 16px;}
.cr-name{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:10px;line-height:1.4;word-break:break-all;}
.cr-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.cr-s-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
.cr-s-v{font-family:'TimesTen',serif;font-size:16px;}
.cr-roas-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;margin-top:8px;}
.roas-a{background:var(--green-bg);color:var(--green);}
.roas-c{background:var(--amber-bg);color:var(--amber);}

/* MAIL */
.mail-cards{display:grid;gap:12px;}
.mail-card{border:1px solid var(--border);padding:18px 20px;background:var(--cream);}
.mail-subject{font-family:'TimesTen',serif;font-size:14px;font-weight:normal;margin-bottom:2px;}
.mail-from{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:14px;}
.mail-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mm-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.mm-v{font-family:'TimesTen',serif;font-size:18px;font-weight:normal;}
.mm-s{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}
.flujo-card{border:1px solid var(--border);padding:14px 20px;background:var(--cream);display:flex;justify-content:space-between;align-items:center;}
.flujo-name{font-family:'TimesTen',serif;font-size:14px;}
.flujo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}
.flujo-ing{font-family:'TimesTen',serif;font-size:20px;color:var(--green);}
.mail-total-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);}
.mail-total-cell{background:var(--cream);padding:18px 20px;}
.mtc-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.mtc-v{font-family:'TimesTen',serif;font-size:26px;font-weight:normal;}
.mtc-s{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;}

/* ECOMM */
.eco-kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border:1px solid var(--border);background:var(--cream);margin-bottom:12px;}
.eco-kpi-cell{padding:18px 20px;border-right:1px solid var(--border);}
.eco-kpi-cell:last-child{border-right:none;}
.eco-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.eco-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.eco-box{border:1px solid var(--border);padding:18px 20px;background:var(--cream);}
.eco-box-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.eco-note{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5;}
.rev-table{width:100%;font-size:12px;border-collapse:collapse;}
.rev-table td{padding:6px 0;border-bottom:1px solid var(--border);}
.rev-table tr:last-child td{border-bottom:none;font-weight:500;}
.rev-table td:last-child{text-align:right;font-family:'DM Mono',monospace;}
.rev-neg{color:var(--red);}
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.conv-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.conv-v{font-family:'TimesTen',serif;font-size:20px;font-weight:normal;}
.conv-s{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.prod-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.prod-tbl th{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:5px 6px 5px 0;border-bottom:1px solid var(--border);font-weight:400;}
.prod-tbl th.r,.prod-tbl td.r{text-align:right;}
.prod-tbl td{padding:6px 6px 6px 0;border-bottom:1px solid var(--border);}
.prod-tbl tr:last-child td{border-bottom:none;}
.green-val{color:var(--green);font-weight:500;}.amber-val{color:var(--amber);}

/* FOOTER */
.footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.footer-note{font-family:'DM Mono',monospace;font-size:8px;color:var(--mid);letter-spacing:0.08em;}
.footer-onmi{display:flex;align-items:center;gap:8px;}
.footer-onmi-label{font-family:'DM Mono',monospace;font-size:7px;color:var(--mid);letter-spacing:0.1em;text-transform:uppercase;}

/* RESPONSIVE */
@media(max-width:768px){
  .hdr{padding:16px 20px;gap:12px;flex-wrap:wrap;}
  .hdr-title{font-size:13px;}
  .hdr-spacer{display:none;}
  .week-selector{order:3;width:100%;justify-content:flex-start;gap:4px;}
  .week-btn{font-size:10px;padding:5px 10px;}
  .hdr-onmi{order:2;margin-left:auto;}
  .wrap{padding:20px 16px 32px;}
  .kpi-row-4{grid-template-columns:repeat(2,1fr);}
  .kpi-row-3{grid-template-columns:repeat(3,1fr);}
  .kpi-cell{padding:14px 16px;}
  .kpi-v{font-size:20px;}
  .camp-table{display:block;overflow-x:auto;}
  .cr-grid{grid-template-columns:1fr;}
  .mail-metrics{grid-template-columns:repeat(2,1fr);}
  .eco-kpi-row{grid-template-columns:repeat(2,1fr);}
  .eco-2col,.eco-3col{grid-template-columns:1fr;}
  .mail-total-grid{grid-template-columns:1fr;}
  .footer{flex-direction:column;gap:12px;align-items:flex-start;}
}
@media(max-width:480px){
  .kpi-row-4,.kpi-row-3{grid-template-columns:1fr 1fr;}
  .kpi-v{font-size:18px;}
  .hdr-div{display:none;}
  .section-block-hdr{flex-wrap:wrap;gap:8px;}
}

// ---- HELPERS ----
const fmt = v => v == null ? '—' : typeof v === 'number' ? v.toLocaleString('es-ES', {minimumFractionDigits: v%1===0?0:2, maximumFractionDigits:2}) : v;
const fmtEur = v => v == null ? '—' : v.toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2}) + '€';
const fmtPct = v => v == null ? '—' : v.toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2}) + '%';

function delta(cur, prev, higherBetter=true) {
  if (cur == null || prev == null || prev === 0) return '';
  const pct = ((cur - prev) / Math.abs(prev)) * 100;
  const up = pct >= 0;
  const good = higherBetter ? up : !up;
  const cls = good ? 'up' : 'down';
  const arrow = up ? '↑' : '↓';
  return `<span class="delta ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}%</span>`;
}

function pillHTML(tipo) {
  const map = { main:'pill-main', scale:'pill-scale', hot:'pill-hot', test:'pill-test', ger:'pill-ger', traf:'pill-traf', incr:'pill-incr' };
  const label = { main:'MAIN', scale:'SCALING', hot:'CALIENTE', test:'TESTING', ger:'DE', traf:'TRÁFICO', incr:'INCREMENTAL' };
  return `<span class="pill ${map[tipo]||''}">${label[tipo]||tipo}</span>`;
}

function roasClass(r) {
  if (r == null) return 'dash';
  if (r >= 3) return 'roas-hi';
  if (r >= 1.5) return 'roas-mid';
  return 'roas-lo';
}

    lines.push(`<strong>${m.compras} compras</strong> · ROAS Meta <strong>${fmt(m.roasMeta)}</strong>.`);
  }
  tags.push({label:`${m.compras} compras${compPct?` ${dir(compPct)}${ab(compPct)}%`:''}`, pos: !compPct||parseFloat(compPct)>=0});
  tags.push({label:`ROAS Meta ${fmt(m.roasMeta)}`, pos: m.roasMeta>=2});

  const roasNegPct = pct(m.roasNeg, pm?.roasNeg);
  lines.push(`ROAS Negocio <strong>${fmt(m.roasNeg)}</strong>${roasNegPct?` (${dir(roasNegPct)}${ab(roasNegPct)}% vs sem. ant.)`:''} · <strong>${fmt(m.roasNeg)}€ por cada euro invertido</strong>.`);
  tags.push({label:`ROAS Negocio ${fmt(m.roasNeg)}`, pos: m.roasNeg>=3});

  if (e.topVentas?.length) {
    const top = e.topVentas[0];
    lines.push(`Producto top: <strong>${top.nombre}</strong>${top.val?` · <strong>${fmtEur(top.val)}</strong> en ventas`:''}.`);
    tags.push({label: top.nombre.split(' ').slice(0,3).join(' '), pos: true});
  }

  const ecomPct = pct(e.totales, pe?.totales);
  const aovPct = pct(e.aov, pe?.aov);
  if (ecomPct !== null) {
    lines.push(`Ventas totales <strong>${fmtEur(e.totales)}</strong> (${parseFloat(ecomPct)>0?'+':''}${ecomPct}%) · Ticket medio <strong>${fmtEur(e.aov)}</strong>${aovPct?` (${dir(aovPct)}${ab(aovPct)}%)`:''}. `);
  } else {
    lines.push(`Ventas totales <strong>${fmtEur(e.totales)}</strong> · Ticket medio <strong>${fmtEur(e.aov)}</strong>.`);
  }

  const convPct = pct(e.conv, pe?.conv);
  if (convPct !== null && Math.abs(parseFloat(convPct)) > 5) {
    lines.push(`Tasa de conversión ${parseFloat(convPct)>0?'subió':'bajó'} hasta <strong>${fmtPct(e.conv)}</strong> (${dir(convPct)}${ab(convPct)}%).`);
    tags.push({label:`Conv. ${fmtPct(e.conv)}`, pos: parseFloat(convPct)>0});
  }

  const tagsHTML = `<div class="summary-tags">${tags.map(t=>`<span class="summary-tag ${t.pos?'pos':'neg'}">${t.label}</span>`).join('')}</div>`;
  const linesHTML = `<div class="summary-lines">${lines.map(l=>`<div class="summary-line">${l}</div>`).join('')}</div>`;
  return `<div class="summary mb32"><div class="summary-title">Resumen de semana</div>${tagsHTML}${linesHTML}</div>`;
}

// ---- META SECTION ----
let metaFilter = 'all';

function calcMetaKpis(campanas, filter) {
  const filtered = filter === 'all' ? campanas : campanas.filter(c => c.cat === filter);
  const inv = filtered.reduce((s,c) => s + (c.inv||0), 0);
  const compras = filtered.reduce((s,c) => s + (c.compras||0), 0);
  const val = filtered.reduce((s,c) => s + (c.val||0), 0);
  const cpa = compras > 0 ? inv/compras : null;
  const roas = inv > 0 ? val/inv : null;
  const aov = compras > 0 ? val/compras : null;
  return {inv, compras, val, cpa, roas, aov};
}

function renderMetaSection(d, p) {
  const m = d.meta, pm = p?.meta;
  const filter = metaFilter;
  const kpis = calcMetaKpis(m.campanas, filter);

      <div class="kpi-cell"><div class="kpi-l">AOV Meta</div><div class="kpi-v">${fmtEur(kpis.aov)}</div><div class="kpi-s">${delta(kpis.aov, pkpis?.aov)} vs sem. ant.</div></div>
      <div class="kpi-cell"><div class="kpi-l">Coste/compra</div><div class="kpi-v">${fmtEur(kpis.cpa)}</div><div class="kpi-s">${delta(kpis.cpa, pkpis?.cpa, false)} vs sem. ant.</div></div>

    <div class="kpi-row kpi-row-3">

      <div class="kpi-cell"><div class="kpi-l">ROAS Negocio</div><div class="kpi-v">${fmt(m.roasNeg)}</div><div class="kpi-s">${delta(m.roasNeg, pm?.roasNeg)} vs sem. ant.</div></div>
      <div class="kpi-cell"><div class="kpi-l">ROAS Neto</div><div class="kpi-v">${fmt(m.roasNeto)}</div><div class="kpi-s">${delta(m.roasNeto, pm?.roasNeto)} vs sem. ant.</div></div>
    </div>
  </div>`;

  // Campaign table filtered
  const filtered = filter === 'all' ? m.campanas : m.campanas.filter(c => c.cat === filter);
  html += `<table class="camp-table mb24"><thead><tr>
    <th>Campaña</th><th class="r">Inversión</th><th class="r">Compras</th>
    <th class="r">AOV</th><th class="r">Valor conv.</th><th class="r">ROAS</th><th class="r">CTR</th><th class="r">CPM</th>

  filtered.forEach(c => {

      <td class="r">${c.compras!=null?c.compras:'<span class="dash">—</span>'}</td>

        </div>
        <span class="cr-roas-badge ${cr.roas>=3.5?'roas-a':'roas-c'}">ROAS ${fmt(cr.roas)}</span>
      </div>
    </div>`;
  });
  html += `</div></div></div>`;
  return html;
}

// ---- EMAIL SECTION ----
let mailFilter = 'campanas';

function renderMailSection(d) {
  const mail = d.mail;
  const filter = mailFilter;

  let html = `<div class="section-block mb24">
    <div class="section-block-hdr email">
      <div class="section-block-title">Email Marketing · ${d.range}</div>
      <div class="filter-tabs">
        <button class="filter-tab ${filter==='campanas'?'active':''}" onclick="setMailFilter('campanas')">CAMPAÑAS</button>
        <button class="filter-tab ${filter==='flujos'?'active':''}" onclick="setMailFilter('flujos')">FLUJOS</button>
        <button class="filter-tab ${filter==='total'?'active':''}" onclick="setMailFilter('total')">TOTAL</button>
      </div>
    </div>
    <div class="section-block-body">`;

  if (filter === 'campanas') {
    const cols = mail.envios.length === 2 ? '1fr 1fr' : mail.envios.length === 3 ? '1fr 1fr 1fr' : '1fr';
    html += `<div class="mail-cards" style="grid-template-columns:${cols}">`;
    mail.envios.forEach(mv => {
      html += `<div class="mail-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:2px;">
          <div class="mail-subject">${mv.subject}</div>
          ${mv.link ? `<a href="${mv.link}" target="_blank" style="flex-shrink:0;font-family:'DM Mono',monospace;font-size:7.5px;padding:3px 9px;border:1px solid var(--border);color:var(--muted);text-decoration:none;letter-spacing:0.08em;white-space:nowrap;margin-top:2px;" onmouseover="this.style.borderColor='var(--black)';this.style.color='var(--black)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">VER EMAIL ↗</a>` : ''}
        </div>
        <div class="mail-from">${mv.fecha} CEST · ${mv.dest.toLocaleString('es-ES')} dest.</div>
        <div class="mail-metrics">
          <div><div class="mm-l">Apertura</div><div class="mm-v">${fmtPct(mv.apertura)}</div></div>
          <div><div class="mm-l">Clics</div><div class="mm-v">${fmtPct(mv.clics)}</div></div>
          <div><div class="mm-l">Pedidos</div><div class="mm-v" style="color:var(--green)">${mv.pedidos}</div></div>
          <div><div class="mm-l">Ingresos</div><div class="mm-v">${fmtEur(mv.ingresos)}</div></div>
        </div>
      </div>`;
    });
    html += `</div>`;
    if (!mail.envios.length) html += `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:20px 0;">Sin envíos esta semana.</div>`;
  }

  if (filter === 'flujos') {
    if (mail.flujos.length) {
      html += `<div class="mail-cards" style="grid-template-columns:1fr;">`;
      mail.flujos.forEach(fl => {
        html += `<div class="flujo-card">
          <div>
            <div class="flujo-name">${fl.nombre}</div>
            <div class="flujo-sub">${fl.desc}</div>
          </div>
          <div class="flujo-ing">${fmtEur(fl.ingresos)}</div>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:20px 0;">Sin datos de flujos esta semana.</div>`;
    }
  }

  if (filter === 'total') {
    const totalEnvios = mail.envios.reduce((s,e) => s + (e.ingresos||0), 0);
    const totalFlujos = mail.flujos.reduce((s,f) => s + (f.ingresos||0), 0);
    const totalPedidos = mail.envios.reduce((s,e) => s + (e.pedidos||0), 0);
    const totalIngresos = totalEnvios + totalFlujos;
    html += `<div class="mail-total-grid">
      <div class="mail-total-cell"><div class="mtc-l">Ingresos campañas</div><div class="mtc-v">${fmtEur(totalEnvios)}</div><div class="mtc-s">${mail.envios.length} envíos · ${totalPedidos} pedidos</div></div>

      <div class="mail-total-cell"><div class="mtc-l">Total email</div><div class="mtc-v" style="color:var(--green)">${fmtEur(totalIngresos)}</div><div class="mtc-s">Campañas + flujos</div></div>
    </div>`;
  }

  html += `</div></div>`;
  return html;
}

// ---- FILTER HANDLERS ----
function setMetaFilter(f) {
  metaFilter = f;
  const wk = currentWeek;
  const idx = weekKeys.indexOf(wk);
  const prevWk = idx > 0 ? weekKeys[idx-1] : null;
  const d = WEEKS[wk], p = prevWk ? WEEKS[prevWk] : null;
  // Re-render only meta section
  const content = document.getElementById('main-content');
  const metaBlock = content.querySelector('.section-block');
  metaBlock.outerHTML = renderMetaSection(d, p);
}

function setMailFilter(f) {
  mailFilter = f;
  const wk = currentWeek;
  const d = WEEKS[wk];
  // Re-render only mail section
  const content = document.getElementById('main-content');
  const blocks = content.querySelectorAll('.section-block');
  blocks[1].outerHTML = renderMailSection(d);
}

// ---- WEEK SELECTOR ----
const weekKeys = Object.keys(WEEKS);
let currentWeek = weekKeys[weekKeys.length - 1];

function buildSelector() {
  const sel = document.getElementById('week-selector');
  sel.innerHTML = weekKeys.map(wk =>
    `<button class="week-btn ${wk===currentWeek?'active':''}" onclick="selectWeek('${wk}')">${WEEKS[wk].label}</button>`
  ).join('');
}

function selectWeek(wk) {
  currentWeek = wk;
  const idx = weekKeys.indexOf(wk);
  const prevWk = idx > 0 ? weekKeys[idx-1] : null;
  buildSelector();
  renderWeek(wk, prevWk);
}

buildSelector();
const initIdx = weekKeys.indexOf(currentWeek);
renderWeek(currentWeek, initIdx > 0 ? weekKeys[initIdx-1] : null);
</script>
